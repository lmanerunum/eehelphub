<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Hub Admin Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
    <div class="admin-shell">
        <header class="admin-header">
            <h1>Help Hub Admin Portal</h1>
            <div class="admin-header-actions">
                <a href="index.html" target="_blank">View Live Site</a>
                <button id="export-btn" class="primary-btn">Export data.js</button>
            </div>
        </header>

        <nav class="admin-tabs">
            <button class="admin-tab active" data-section="menu">Menu Structure</button>
            <button class="admin-tab" data-section="tasks">Top-Level Tasks</button>
            <button class="admin-tab" data-section="submenu">Submenu Tasks</button>
            <button class="admin-tab" data-section="infopages">Info Pages</button>
        </nav>

        <main class="admin-main">
            <section id="section-menu" class="admin-section active">
                <div class="section-toolbar">
                    <h2>Menu Structure</h2>
                    <button class="add-btn" data-add="menu-tab">+ Add Tab</button>
                    <button class="add-btn" data-add="menu-group">+ Add Menu Group</button>
                </div>
                <div id="menu-list" class="admin-list"></div>
            </section>

            <section id="section-tasks" class="admin-section">
                <div class="section-toolbar">
                    <h2>Top-Level Tasks</h2>
                    <button class="add-btn" data-add="task">+ Add Task</button>
                </div>
                <div id="tasks-list" class="admin-list"></div>
            </section>

            <section id="section-submenu" class="admin-section">
                <div class="section-toolbar">
                    <h2>Submenu Tasks</h2>
                    <button class="add-btn" data-add="submenu-task">+ Add Submenu Task</button>
                </div>
                <div id="submenu-list" class="admin-list"></div>
            </section>

            <section id="section-infopages" class="admin-section">
                <div class="section-toolbar">
                    <h2>Info Pages</h2>
                    <button class="add-btn" data-add="infopage">+ Add Info Page</button>
                </div>
                <div id="infopages-list" class="admin-list"></div>
            </section>
        </main>
    </div>

    <div id="modal-backdrop" class="modal-backdrop">
        <div class="modal">
            <h3 id="modal-title">Edit</h3>
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button id="modal-cancel" class="secondary-btn">Cancel</button>
                <button id="modal-save" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
